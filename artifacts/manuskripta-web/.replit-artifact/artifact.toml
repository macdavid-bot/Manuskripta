kind = "web"
previewPath = "/manuskripta-web/"
title = "Manuskripta Web"
version = "1.0.0"
id = "artifacts/manuskripta-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/manuskripta-web/" ]
localPort = 24421

[services.development]
run = "pnpm --filter @workspace/manuskripta-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manuskripta-web", "run", "build" ]
publicDir = "artifacts/manuskripta-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24421"
BASE_PATH = "/manuskripta-web/"
