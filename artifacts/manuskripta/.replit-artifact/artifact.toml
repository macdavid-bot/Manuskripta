kind = "mobile"
previewPath = "/"
title = "Manuskripta"
version = "1.0.0"
id = "artifacts/manuskripta"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20069

[services.development]
run = "pnpm --filter @workspace/manuskripta run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manuskripta", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/manuskripta", "run", "serve" ]

[services.env]
PORT = "20069"
BASE_PATH = "/"
